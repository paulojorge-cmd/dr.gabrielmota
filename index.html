document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1628;--mid:#3a4f6a;--gray:#6b7f96;--line:#e2eaf3;--line-dk:rgba(255,255,255,.12);\n  --card:#f5faff;--r:14px;--font:'Inter',sans-serif;\n}\nbody{font-family:var(--font);font-size:16px;background:var(--white);color:#0f1c2e;line-height:1.65;overflow-x:hidden;-webkit-font-smoothing:antialiased}\nh1,h2,h3,h4{font-family:var(--font);line-height:1.15;color:#0f1c2e}\np{color:var(--mid)}\na{text-decoration:none;color:inherit}\nimg{display:block;max-width:100%}\n\n/* ── WA FLOAT ────────────────────────────── */\n@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px) rotate(-2deg)}75%{transform:translateX(2px) rotate(2deg)}}\n@keyframes iconPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}\n.wa-float{\n  position:fixed;bottom:22px;right:18px;z-index:999;\n  display:flex;align-items:center;gap:9px;\n  background:linear-gradient(135deg,#25D366,#1aab55);\n  color:#fff;font-family:var(--font);font-size:14px;font-weight:600;\n  padding:12px 18px 12px 14px;border-radius:100px;\n  box-shadow:0 6px 28px rgba(37,211,102,.38);\n  transition:transform .2s,box-shadow .2s;\n}\n.wa-float:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(37,211,102,.46)}\n.wa-float.shake{animation:shake .4s ease-in-out}\n.wa-float svg{width:20px;height:20px;flex-shrink:0;transition:transform .2s}\n.wa-float.shake svg{animation:iconPulse .4s ease-in-out}\n\n/* ── TOPBAR ───────────────────────────────── */\n.topbar{background:var(--blue);color:#fff;text-align:center;font-size:13px;font-weight:500;letter-spacing:.02em;padding:9px 16px}\n\n/* ── NAV ──────────────────────────────────── */\nnav{\n  position:sticky;top:0;z-index:100;\n  background:rgba(255,255,255,.92);backdrop-filter:blur(16px);\n  border-bottom:1px solid var(--line);padding:14px 24px;\n  display:flex;align-items:center;justify-content:space-between;\n}\n.nav-logo{display:flex;align-items:center;gap:10px}\n.logo-icon{\n  width:36px;height:36px;border-radius:8px;\n  background:linear-gradient(135deg,var(--blue),var(--cyan));\n  display:flex;align-items:center;justify-content:center;\n  font-size:20px;\n}\n.logo-text{font-family:var(--font);font-size:16px;font-weight:800;letter-spacing:-.01em}\n.logo-text span{background:linear-gradient(90deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.nav-cta{\n  background:var(--blue);color:#fff;\n  font-family:var(--font);font-size:13px;font-weight:600;\n  padding:9px 18px;border-radius:100px;transition:background .18s;\n}\n.nav-cta:hover{background:var(--blue2)}\n\n/* ── WRAP ─────────────────────────────────── */\n.wrap{max-width:1140px;margin:0 auto;padding:0 40px}\n\n/* ── SECTION ──────────────────────────────── */\nsection{padding:80px 0}\nsection{position:relative}section.alt{background:var(--off)}\nsection.alt h2,section.alt h3,section.alt h4{color:#fff}\nsection.alt p{color:rgba(255,255,255,.7)}\nsection.alt .sec-tag{color:var(--cyan)}\nsection.alt .sec-tag::before{background:var(--cyan)}\nsection.alt .stat{background:rgba(255,255,255,.08);border-color:var(--line-dk)}\nsection.alt .stat-l{color:rgba(255,255,255,.55)}\nsection.alt .testi{background:rgba(255,255,255,.06);border-color:var(--line-dk)}\nsection.alt .testi-text{color:rgba(255,255,255,.9)}\nsection.alt .testi-author{color:rgba(255,255,255,.5)}\nsection.alt .cred{color:rgba(255,255,255,.85)}\nsection.alt .agit-box{background:rgba(255,255,255,.05);border-color:rgba(77,179,255,.45);border-left-color:var(--cyan)}\nsection.alt .agit-box p{color:rgba(255,255,255,.75)}\nsection.alt .agit-hl{color:#fff;border-left-color:var(--cyan)}\n\n/* ── SEC HEADER ───────────────────────────── */\n.sec-tag{\n  display:inline-flex;align-items:center;gap:8px;\n  font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;\n  color:var(--blue);margin-bottom:14px;\n}\n.sec-tag::before{content:'';width:22px;height:2px;background:var(--blue);border-radius:2px}\nh2.sec-title{\n  font-size:clamp(2 <\u002Fdiv>\n    <h2 class=\"sec-title\">Cada ano que passa, você continua <em>escondendo o sorriso<\u002Fem> que merecia ter.<\u002Fh2>\n    <div class=\"agit-box\">\n      <p>A insegurança com o sorriso afeta mais do que você percebe: a forma como você se apresenta em reuniões, como aparece nas redes sociais, como se sente numa festa.<\u002Fp>\n      <p>Autoestima não é superficial. E deixar isso pra depois tem um custo real — que se paga todo dia em pequenos momentos onde você se contém.<\u002Fp>\n      <div class=\"agit-hl\">Não existe versão melhor de você que ainda se esconde ao sorrir.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SOLUÇÃO -->\n<section>\n  <div class=\"wrap\" style=\"position:relative\">\n    \n    \n    <div class=\"reveal\">\n      <div class=\"sec-tag\">A solução<\u002Fdiv>\n      <h2 class=\"sec-title\">Sorriso transformado em <em>até 3 sessões<\u002Fem>, sem desgastar seus dentes.<\u002Fh2>\n      <p>Com o Dr. Gabriel Mota, você vê o resultado antes de começar — e decide com segurança.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"steps reveal\">\n      <div class=\"step\">\n        <div class=\"step-n\">1<\u002Fdiv>\n        <div><strong>Simulação digital gratuita<\u002Fstrong><p>Na primeira consulta você já vê como ficará seu sorriso, antes de qualquer procedimento.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-n\">2<\u002Fdiv>\n        <div><strong>Lentes ultrafinas, sem desgaste<\u002Fstrong><p>A estrutura natural do dente é preservada. Sem dor, sem remoção excessiva de esmalte.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-n\">3<\u002Fdiv>\n        <div><strong>Resultado completo em até 3 sessões<\u002Fstrong><p>Cor, formato e alinhamento corrigidos de uma vez, com laboratório digital próprio.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"bene-grid reveal\">\n      <div class=\"bene\"><div c
